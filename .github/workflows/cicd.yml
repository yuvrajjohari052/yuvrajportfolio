#create workflow
name: CICD
#when trigger
on:
  workflow_dispatch:
    inputs:
      environment:
        description: this is enc value where workflows runs
        default: 'dev'
        required: true
        type: choice
        options:
          - dev
          - prod
          - staging

jobs:
  code:
   
    runs-on: ubuntu-latest
    steps:
     - name: checkout code
       run: echo "code clone from github"
  
  build:
    needs: code
    runs-on: ubuntu-latest
    steps:
      - name: docker container
        run: echo "docker container built."
  
  test:
    needs: [build , code ]
    runs-on: ubuntu-latest
    steps:
      - name: twst on docker ps
        run: echo "code pass the test"
    
  deploy:
    if: inputs.environment == 'dev'
    needs: [code,build,test]
    runs-on: ubuntu-latest
    steps:
      - name: deploy
        run: echo "docker compose deploy the app"

